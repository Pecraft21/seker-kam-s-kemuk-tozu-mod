name: Build Mod JAR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 21 kur
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle izinlerini ver
        run: chmod +x ./gradlew

      - name: Gradle Wrapper indir
        uses: gradle/actions/setup-gradle@v3

      - name: Mod derle
        run: ./gradlew build --no-daemon

      - name: JAR dosyasını yayınla
        uses: actions/upload-artifact@v4
        with:
          name: sugarcane-bonemeal-fix
          path: build/libs/sugarcane-bonemeal-fix-*.jar
          if-no-files-found: error
